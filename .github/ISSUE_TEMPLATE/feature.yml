name: Feature or capability
description: Propose a scoped SXF capability with measurable acceptance criteria.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem should SXF solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior, not an implementation preference.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Provide a testable checklist.
      placeholder: |
        - [ ] Given ..., when ..., then ...
        - [ ] Evidence includes ...
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Security, reliability, and cost considerations
      description: Identify permissions, failure modes, budgets, or destructive actions.
  - type: textarea
    id: context
    attributes:
      label: Additional context
