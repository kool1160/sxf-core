name: Bug report
description: Report reproducible incorrect SXF behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure ...
        2. Submit ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include relevant state, logs, task IDs, or screenshots with secrets removed.
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Cosmetic or documentation
        - Task failure with safe recovery
        - Incorrect repository mutation
        - Security or cross-project isolation risk
    validations:
      required: true
